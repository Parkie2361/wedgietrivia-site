<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout — Wedgie Trivia</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0a1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            text-align: center;
            padding: 32px 24px 16px;
        }
        .header h1 {
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 4px;
        }
        .header p {
            color: #888;
            font-size: 0.9rem;
        }
        #checkout-container {
            width: 100%;
            max-width: 500px;
            padding: 0 16px;
            flex: 1;
        }
        .loading {
            text-align: center;
            padding: 64px 24px;
            color: #888;
        }
        .error {
            text-align: center;
            padding: 64px 24px;
            color: #ef4444;
        }
        .success {
            text-align: center;
            padding: 64px 24px;
        }
        .success h2 {
            color: #22c55e;
            font-size: 1.5rem;
            margin-bottom: 12px;
        }
        .success p {
            color: #ccc;
            margin-bottom: 24px;
        }
        .success a {
            color: #c084fc;
            text-decoration: none;
            font-weight: 600;
        }
        .footer {
            text-align: center;
            padding: 16px;
            color: #444;
            font-size: 0.8rem;
        }
        .footer a { color: #666; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Wedgie Trivia</h1>
        <p>Secure checkout</p>
    </div>

    <div id="checkout-container">
        <div class="loading" id="loading">Loading checkout...</div>
    </div>

    <div class="footer">
        <a href="https://www.wedgietrivia.com/terms">Terms of Service</a> &middot;
        <a href="mailto:support@wedgietrivia.com">Support</a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const clientSecret = params.get('client_secret');
        const sessionStatus = params.get('payment');

        if (sessionStatus === 'success') {
            document.getElementById('checkout-container').innerHTML =
                '<div class="success">' +
                '<h2>Payment Successful!</h2>' +
                '<p>Your credits have been added to your account.</p>' +
                '<a href="https://play.wedgietrivia.com">Return to Wedgie Trivia</a>' +
                '</div>';
        } else if (clientSecret) {
            initCheckout(clientSecret);
        } else {
            document.getElementById('checkout-container').innerHTML =
                '<div class="error">No checkout session found. Please start a purchase from the game.</div>';
        }

        async function initCheckout(secret) {
            try {
                const stripe = Stripe('pk_live_51T5z3fFErKEwixTtYQN1uYYBbD25fMvhiUVjja3fv50eJIaiJMSjFliwtY5k4m3a1yMLZeevd49pHt1BfLYhOm5G00G4cXTa6E');
                const checkout = await stripe.initEmbeddedCheckout({
                    clientSecret: secret
                });
                document.getElementById('loading').remove();
                checkout.mount('#checkout-container');
            } catch (err) {
                document.getElementById('checkout-container').innerHTML =
                    '<div class="error">Failed to load checkout: ' + err.message + '</div>';
            }
        }
    </script>
</body>
</html>
