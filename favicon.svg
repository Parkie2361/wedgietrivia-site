<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="-4 -6 32 34" fill="none">
  <defs>
    <!-- SVG 1.1 compatible drop shadow filters -->
    <filter id="outer-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset dx="0" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="lift-shadow" x="-80%" y="-120%" width="300%" height="380%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2" result="blur"/>
      <feOffset dx="0" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="w-shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1" result="blur"/>
      <feOffset dx="0" dy="1.2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.55" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="grad-green" x1="0.4" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#44ee44"/>
      <stop offset="40%" stop-color="#00A100"/>
      <stop offset="100%" stop-color="#005500"/>
    </linearGradient>
    <linearGradient id="grad-pink" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#ff66cc"/>
      <stop offset="45%" stop-color="#F2008F"/>
      <stop offset="100%" stop-color="#880050"/>
    </linearGradient>
    <linearGradient id="grad-orange" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#ff9944"/>
      <stop offset="45%" stop-color="#FF5200"/>
      <stop offset="100%" stop-color="#992200"/>
    </linearGradient>
    <linearGradient id="grad-purple" x1="0.8" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#aa22aa"/>
      <stop offset="45%" stop-color="#620062"/>
      <stop offset="100%" stop-color="#300030"/>
    </linearGradient>
    <linearGradient id="grad-blue" x1="0.8" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#6688ff"/>
      <stop offset="45%" stop-color="#2A65FF"/>
      <stop offset="100%" stop-color="#0022aa"/>
    </linearGradient>
    <linearGradient id="grad-yellow" x1="0.6" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#ffff55"/>
      <stop offset="45%" stop-color="#C5C500"/>
      <stop offset="100%" stop-color="#777700"/>
    </linearGradient>
    <radialGradient id="gloss-top" cx="50%" cy="15%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="grad-w" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#f0faff"/>
      <stop offset="40%" stop-color="#7ecfff"/>
      <stop offset="100%" stop-color="#2a8fcf"/>
    </linearGradient>
    <radialGradient id="ring-grad" cx="50%" cy="40%" r="55%">
      <stop offset="75%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a18"/>
    </radialGradient>

    <clipPath id="clip-pie">
      <circle cx="12" cy="12" r="10"/>
    </clipPath>
    <clipPath id="clip-outer">
      <circle cx="12" cy="12" r="11"/>
    </clipPath>
  </defs>

  <!-- Outer dark ring -->
  <circle cx="12" cy="12" r="11" fill="url(#ring-grad)" filter="url(#outer-shadow)"/>
  <circle cx="12" cy="12" r="10.3" fill="#111122"/>

  <!-- Base 5 wedges -->
  <g clip-path="url(#clip-pie)">
    <path d="M12,12 L20.66,7  A10,10 0 0,1 20.66,17 Z" fill="url(#grad-pink)"/>
    <path d="M12,12 L20.66,17 A10,10 0 0,1 12,22 Z"    fill="url(#grad-orange)"/>
    <path d="M12,12 L12,22    A10,10 0 0,1 3.34,17 Z"  fill="url(#grad-purple)"/>
    <path d="M12,12 L3.34,17  A10,10 0 0,1 3.34,7 Z"   fill="url(#grad-blue)"/>
    <path d="M12,12 L3.34,7   A10,10 0 0,1 12,2 Z"     fill="url(#grad-yellow)"/>
  </g>

  <!-- Dividers -->
  <g clip-path="url(#clip-pie)" stroke="#111122" stroke-width="0.5" stroke-linecap="square">
    <line x1="12" y1="12" x2="20.66" y2="7"/>
    <line x1="12" y1="12" x2="20.66" y2="17"/>
    <line x1="12" y1="12" x2="12"    y2="22"/>
    <line x1="12" y1="12" x2="3.34"  y2="17"/>
    <line x1="12" y1="12" x2="3.34"  y2="7"/>
    <line x1="12" y1="12" x2="12"    y2="2"/>
  </g>

  <!-- Gloss on base -->
  <circle cx="12" cy="12" r="10" fill="url(#gloss-top)"/>
  <circle cx="12" cy="12" r="10" fill="none" stroke="#111122" stroke-width="0.5"/>

  <!-- Dark slot at green wedge position -->
  <path d="M12,12 L12,2 A10,10 0 0,1 20.66,7 Z" fill="#0a0a18" clip-path="url(#clip-pie)"/>

  <!-- Lifted green wedge — pre-computed coordinates shifted up by 1.5 -->
  <g clip-path="url(#clip-outer)">
    <g filter="url(#lift-shadow)">
      <path d="M12,10.5 L12,0.5 A10,10 0 0,1 20.66,5.5 Z" fill="url(#grad-green)"/>
      <path d="M12,10.5 L12,0.5 A10,10 0 0,1 20.66,5.5 Z" fill="url(#gloss-top)"/>
    </g>
    <path d="M12,10.5 L12,0.5 A10,10 0 0,1 20.66,5.5 Z" fill="none" stroke="#111122" stroke-width="0.5" stroke-linejoin="round"/>
  </g>

  <!-- W navy base -->
  <path d="M4.5,9 Q4,9 4,9.5 L7.5,18.5 Q7.8,19.2 8.5,19.2 L9.8,19.2 Q10.5,19.2 10.8,18.5 L12,15.5 L13.2,18.5 Q13.5,19.2 14.2,19.2 L15.5,19.2 Q16.2,19.2 16.5,18.5 L20,9.5 Q20,9 19.5,9 L18.2,9 Q17.5,9 17.2,9.8 L14.5,16.8 L12,11.5 L9.5,16.8 L6.8,9.8 Q6.5,9 5.8,9 Z"
    fill="#0d1a40" stroke="#0d1a40" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"
    filter="url(#w-shadow)"/>
  <!-- W gradient fill -->
  <path d="M4.5,9 Q4,9 4,9.5 L7.5,18.5 Q7.8,19.2 8.5,19.2 L9.8,19.2 Q10.5,19.2 10.8,18.5 L12,15.5 L13.2,18.5 Q13.5,19.2 14.2,19.2 L15.5,19.2 Q16.2,19.2 16.5,18.5 L20,9.5 Q20,9 19.5,9 L18.2,9 Q17.5,9 17.2,9.8 L14.5,16.8 L12,11.5 L9.5,16.8 L6.8,9.8 Q6.5,9 5.8,9 Z"
    fill="url(#grad-w)"/>
</svg>
